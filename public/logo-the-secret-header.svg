<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" fill="none">

  <!-- MIRA — canto esquerdo -->
  <circle cx="30" cy="34" r="26" stroke="#571c16" stroke-width="2"/>
  <circle cx="30" cy="34" r="14" stroke="#571c16" stroke-width="1.5"/>
  <line x1="30" y1="4"  x2="30" y2="64" stroke="#571c16" stroke-width="1.5"/>
  <line x1="0"  y1="34" x2="60" y2="34" stroke="#571c16" stroke-width="1.5"/>
  <!-- cogumelo no centro da mira -->
  <ellipse cx="30" cy="33" rx="8" ry="5" fill="#571c16" opacity="0.9"/>
  <rect x="28" y="33" width="4" height="6" rx="1" fill="#571c16" opacity="0.9"/>

  <!-- TEXTO: "The Secret" — grande, branco -->
  <text x="68" y="48"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="46"
        font-weight="800"
        fill="white"
        letter-spacing="-1">The Secret</text>

  <!-- TEXTO: "Funghi" — Explora, vermelho brand, grudado após Secret -->
  <text x="330" y="34"
        font-family="'Explora', cursive"
        font-size="36"
        fill="#571c16"
        letter-spacing="1"
        dominant-baseline="middle">Funghi</text>

  <!-- SUBTÍTULO: MUSHROOM HUNTERS -->
  <text x="70" y="66"
        font-family="monospace"
        font-size="9"
        letter-spacing="4"
        fill="white"
        opacity="0.55">MUSHROOM HUNTERS</text>

</svg>
